name: Update GeoIP

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy geo files from remnanode
        run: |
          docker exec remnanode-xtls cat /usr/local/share/xray/geoip.dat > geoip.dat
          docker exec remnanode-xtls cat /usr/local/share/xray/geosite.dat > geosite.dat

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geoip.dat geosite.dat
          git diff --staged --quiet || git commit -m "Update geo files $(date -u +%Y-%m-%d)"
          git push
